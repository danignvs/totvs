
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Horas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --az-escuro: #1e293b;
            --az-claro: #0ea5e9;
            --laranja: #f59e0b;
            --cinza: #e2e8f0;
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--az-escuro);
        }

        .calendario-grid { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            gap: 4px; 
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .cal-dia { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 4px 2px; 
            min-height: 46px; 
            border-radius: 6px;
            background: white;
            border: 1px solid var(--cinza);
            transition: all 0.2s;
        }

        .cal-dia span { font-size: 0.6rem; font-weight: 600; margin-bottom: 2px; }

        .cal-dia input { 
            width: 85%; 
            padding: 1px; 
            text-align: center; 
            border: 1px solid transparent;
            background: #f1f5f9;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .cal-dia input:focus { border-color: var(--az-claro); outline: none; background: white; }
        .cal-dia.fora-mes { visibility: hidden; }
        .cal-dia.descanso { background-color: #f1f5f9; color: #94a3b8; }
        .cal-dia.fora-periodo { opacity: 0.3; pointer-events: none; }
        .cal-dia.preenchido-descanso { background-color: #fef3c7; border-color: var(--laranja); }
        .cal-dia.preenchido-descanso input { color: #b45309; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .calendarios-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        @media (min-width: 768px), (orientation: landscape) {
            .calendarios-container {
                flex-direction: row !important;
                justify-content: center;
                gap: 3rem;
            }
            .mes-wrapper {
                flex: 0 1 300px;
            }
            .mes-proximo { display: block !important; }
        }

        @media (max-width: 767px) and (orientation: portrait) {
            .mes-proximo { display: none !important; }
            .calendarios-container { align-items: center; }
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <header class="bg-slate-900 p-4 text-white flex justify-between items-center">
            <h1 class="text-lg font-bold italic"><span class="text-sky-400">Calculadora</span> de Horas</h1>
            <div id="statusIndicator" class="status-badge bg-slate-700 text-slate-300 uppercase tracking-tighter">Aguardando</div>
        </header>

        <div class="p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
            <aside class="lg:col-span-3 space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-1 gap-3">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Total Alvo</label>
                        <input type="number" id="txtHoras" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" oninput="gerarDistribuicao()">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Início</label>
                        <input type="date" id="txtInicio" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" onchange="gerarDistribuicao()">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Fim</label>
                        <input type="date" id="txtFim" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" onchange="gerarDistribuicao()">
                    </div>
                </div>

                <div class="p-3 bg-sky-50 rounded-xl border border-sky-100 text-xs text-sky-800 space-y-1">
                    <div class="flex justify-between"><span>Lançado:</span> <span id="resumoLancado" class="font-bold">0,00h</span></div>
                    <div class="flex justify-between"><span>Restante:</span> <span id="resumoRestante" class="font-bold">0,00h</span></div>
                </div>

                <div class="flex gap-2 lg:flex-col">
                    <button onclick="copiarTabela()" class="flex-1 bg-slate-800 text-white p-2 rounded-lg font-bold text-xs hover:bg-slate-700">Copiar</button>
                    <button onclick="limparTudo()" class="flex-1 text-slate-400 p-2 text-[10px] hover:text-red-500">Limpar</button>
                </div>
            </aside>

            <main class="lg:col-span-9 border-t lg:border-t-0 pt-4 lg:pt-0">
                <div class="flex items-center justify-between mb-4 px-2">
                    <button onclick="mudarMes(-1)" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 font-bold">❮</button>
                    <h2 id="calMesAno" class="font-black text-slate-700 uppercase tracking-tight text-sm">Mês</h2>
                    <button onclick="mudarMes(1)" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 font-bold">❯</button>
                </div>

                <div id="calendariosWrapper" class="calendarios-container">
                    <!-- Gerado JS -->
                </div>
                
                <div id="avisoFeriado" class="hidden mt-4 p-2 bg-amber-50 border border-amber-200 text-amber-700 text-[10px] rounded-lg text-center">
                    ⚠️ Horas em fins de semana ou feriados detectadas.
                </div>
            </main>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        currentDate.setDate(1);
        let horasState = {};
        const FERIADOS_FIXOS = ["01/01", "21/04", "01/05", "07/09", "12/10", "02/11", "15/11", "20/11", "25/12", "09/07"];

        function getFeriados(ano) {
            let feriados = FERIADOS_FIXOS.map(f => `${f}/${ano}`);
            let a = ano % 19, b = Math.floor(ano / 100), c = ano % 100, d = Math.floor(b / 4), e = b % 4;
            let g = Math.floor((b + 8) / 25), h = (19 * a + b - d - Math.floor((b - g + 1) / 3) + 15) % 30;
            let i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
            let m = Math.floor((a + 11 * h + 22 * l) / 451), mes = Math.floor((h + l - 7 * m + 114) / 31), dia = ((h + l - 7 * m + 114) % 31) + 1;
            let pascoa = new Date(ano, mes - 1, dia);
            const fmt = (d) => `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${ano}`;
            return [...feriados, fmt(new Date(pascoa.getTime() - 47*86400000)), fmt(new Date(pascoa.getTime() - 2*86400000)), fmt(new Date(pascoa.getTime() + 60*86400000))];
        }

        function gerarDistribuicao() {
            const totalAlvo = parseFloat(document.getElementById('txtHoras').value) || 0;
            const dtInStr = document.getElementById('txtInicio').value;
            const dtFimStr = document.getElementById('txtFim').value;
            if (dtInStr && dtFimStr && totalAlvo > 0) {
                const d1 = new Date(dtInStr + "T12:00:00"), d2 = new Date(dtFimStr + "T12:00:00");
                if (d2 >= d1) {
                    let diasUteis = [];
                    let temp = new Date(d1);
                    while (temp <= d2) {
                        const ds = temp.getDay();
                        const fers = getFeriados(temp.getFullYear());
                        const str = `${String(temp.getDate()).padStart(2, '0')}/${String(temp.getMonth() + 1).padStart(2, '0')}/${temp.getFullYear()}`;
                        if (ds !== 0 && ds !== 6 && !fers.includes(str)) diasUteis.push(str);
                        temp.setDate(temp.getDate() + 1);
                    }
                    if (diasUteis.length > 0) {
                        horasState = {};
                        const media = totalAlvo / diasUteis.length;
                        diasUteis.forEach(d => horasState[d] = parseFloat(media.toFixed(2)));
                    }
                }
            }
            renderCalendario();
        }

        function mudarMes(n) {
            currentDate.setMonth(currentDate.getMonth() + n);
            renderCalendario();
        }

        function renderCalendario() {
            const wrapper = document.getElementById('calendariosWrapper');
            const tit = document.getElementById('calMesAno');
            const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            
            wrapper.innerHTML = '';
            const m1 = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            const m2 = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
            const isWide = window.innerWidth >= 768 || window.matchMedia("(orientation: landscape)").matches;

            tit.innerText = isWide ? `${mesesNomes[m1.getMonth()]} - ${mesesNomes[m2.getMonth()]} / ${m1.getFullYear()}` : `${mesesNomes[m1.getMonth()]} ${m1.getFullYear()}`;

            [m1, m2].forEach((baseDate, idx) => {
                const mesWrapper = document.createElement('div');
                mesWrapper.className = `mes-wrapper ${idx === 1 ? 'mes-proximo' : ''}`;
                
                const mesHeader = document.createElement('div');
                mesHeader.className = 'text-center font-bold text-slate-400 text-[10px] mb-3 uppercase tracking-widest';
                mesHeader.innerText = `${mesesNomes[baseDate.getMonth()]} ${baseDate.getFullYear()}`;
                mesWrapper.appendChild(mesHeader);

                const grid = document.createElement('div');
                grid.className = 'calendario-grid';
                ["D","S","T","Q","Q","S","S"].forEach(d => {
                    const h = document.createElement('div');
                    h.className = 'text-center text-[8px] font-black text-slate-300 pb-1';
                    h.innerText = d;
                    grid.appendChild(h);
                });

                const ano = baseDate.getFullYear(), mes = baseDate.getMonth();
                const primeiroDia = new Date(ano, mes, 1).getDay();
                const ultimoDia = new Date(ano, mes + 1, 0).getDate();
                const feriados = getFeriados(ano);
                const dtIn = document.getElementById('txtInicio').value ? new Date(document.getElementById('txtInicio').value + "T12:00:00") : null;
                const dtFim = document.getElementById('txtFim').value ? new Date(document.getElementById('txtFim').value + "T12:00:00") : null;

                for (let i = 0; i < primeiroDia; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'cal-dia fora-mes'}));

                for (let d = 1; d <= ultimoDia; d++) {
                    const dateObj = new Date(ano, mes, d, 12);
                    const dateStr = `${String(d).padStart(2, '0')}/${String(mes + 1).padStart(2, '0')}/${ano}`;
                    const isFds = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                    const isFeriado = feriados.includes(dateStr);
                    const fora = (dtIn && dateObj < dtIn) || (dtFim && dateObj > dtFim);
                    
                    const div = document.createElement('div');
                    div.className = `cal-dia ${isFds || isFeriado ? 'descanso' : ''} ${fora ? 'fora-periodo' : ''}`;
                    const hVal = horasState[dateStr] || "";
                    if ((isFds || isFeriado) && hVal > 0) div.classList.add('preenchido-descanso');

                    div.innerHTML = `<span>${d}</span><input type="number" step="0.1" value="${hVal}" oninput="updateHora('${dateStr}', this.value)" placeholder="${isFds || isFeriado ? '-' : '0'}">`;
                    grid.appendChild(div);
                }
                mesWrapper.appendChild(grid);
                wrapper.appendChild(mesWrapper);
            });
            atualizarCalculos();
        }

        window.onresize = renderCalendario;

        function updateHora(data, val) {
            const num = parseFloat(val);
            if (isNaN(num) || num <= 0) delete horasState[data];
            else horasState[data] = num;
            atualizarCalculos();
        }

        function atualizarCalculos() {
            const alvo = parseFloat(document.getElementById('txtHoras').value) || 0;
            let total = 0, alerta = false;
            Object.keys(horasState).forEach(k => {
                total += horasState[k];
                const [d, m, a] = k.split('/').map(Number);
                const dobj = new Date(a, m - 1, d, 12);
                if (dobj.getDay() === 0 || dobj.getDay() === 6 || getFeriados(a).includes(k)) alerta = true;
            });

            document.getElementById('resumoLancado').innerText = total.toFixed(2).replace('.', ',') + 'h';
            document.getElementById('resumoRestante').innerText = Math.max(0, alvo - total).toFixed(2).replace('.', ',') + 'h';
            document.getElementById('avisoFeriado').classList.toggle('hidden', !alerta);

            const badge = document.getElementById('statusIndicator');
            if (alvo === 0) { badge.innerText = "SEM ALVO"; badge.className = "status-badge bg-slate-700 text-slate-300"; }
            else if (Math.abs(total - alvo) < 0.01) { badge.innerText = "FECHOU!"; badge.className = "status-badge bg-green-500 text-white"; }
            else { 
                badge.innerText = total > alvo ? `+${(total - alvo).toFixed(2)}H` : `-${(alvo - total).toFixed(2)}H`;
                badge.className = total > alvo ? "status-badge bg-red-500 text-white" : "status-badge bg-amber-500 text-white";
            }
        }

        function copiarTabela() {
            const keys = Object.keys(horasState).sort((a, b) => {
                const [d1, m1, y1] = a.split('/').map(Number), [d2, m2, y2] = b.split('/').map(Number);
                return new Date(y1, m1, d1) - new Date(y2, m2, d2);
            });
            if (keys.length === 0) return;
            let t = "Data\tHoras\n";
            keys.forEach(k => t += `${k}\t${horasState[k].toFixed(2).replace('.', ',')}\n`);
            const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el); alert("Copiado com sucesso!");
        }

        function limparTudo() {
            if(confirm("Deseja limpar todos os dados?")) {
                document.getElementById('txtHoras').value = "";
                document.getElementById('txtInicio').value = "";
                document.getElementById('txtFim').value = "";
                horasState = {}; renderCalendario();
            }
        }
        window.onload = renderCalendario;
    </script>
</body>
</html>
